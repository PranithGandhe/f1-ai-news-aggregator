<!DOCTYPE html>
<html>

<head>
    <title>{{ page_title or "AI Powered F1 News Aggregator"}}</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #38bdf8;
        }

        h2 {
            text-align: center;
            margin-top: 10px;
            color: #cbd5f5;
        }

        .container {
            padding: 20px;
        }

        .categories {
            text-align: center;
            margin-bottom: 20px;
        }

        .categories a {
            margin: 5px;
            padding: 8px 14px;
            background: #1e293b;
            border-radius: 20px;
            text-decoration: none;
            color: #e2e8f0;
            font-size: 14px;
        }

        .categories a:hover {
            background: #38bdf8;
            color: black;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 12px;
            color: black;
            margin-bottom: 10px;
        }

        .badge.race {
            background: #ef4444;
            color: white;
        }

        .badge.driver {
            background: #3b82f6;
            color: white;
        }

        .badge.team {
            background: #10b981;
            color: white;
        }

        .badge.tech {
            background: #a855f7;
            color: white;
        }

        .badge.other {
            background: #64748b;
            color: white;
        }

        .date {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .summary {
            font-size: 14px;
            margin-bottom: 10px;
            color: #cbd5f5;
        }

        .footer {
            font-size: 12px;
            color: #94a3b8;
        }

        a.read {
            color: #38bdf8;
            text-decoration: none;
        }

    </style>

</head>

<body>

<header>
    🏎️ AI Powered F1 News
</header>

<h2>{{ page_title or "Latest F1 News"}}</h2>

<div class="container">

    <div class="categories">
        <a href="/">All</a>
        <a href="/category/Race Results">Race Results</a>
        <a href="/category/Driver News">Driver News</a>
        <a href="/category/Team Updates">Team Updates</a>
        <a href="/category/Technical_Regulation">Technical</a>
        <a href="/category/Other">Other</a>
    </div>

    <div class="grid">

        {% for article in articles %}

        <div class="card">

            <div class="badge 
                {% if article.category == 'Race Results' %}race
                {% elif article.category == 'Driver News' %}driver
                {% elif article.category == 'Team Updates' %}team
                {% elif article.category == 'Technical_Regulation' %}tech
                {% else %}other
                {% endif %}
            ">
                {{ article.category }}
            </div>

            <div class="title">
                {{ article.title }}
            </div>

            <div class="date">
                {{ time_ago(article.published_date) }}
            </div>

            <div class="summary">
                {{ article.summary }}
            </div>

            <div class="footer">
                {{ article.source }} |
                <a class="read" href="{{ article.link }}" target="_blank">
                    Read →
                </a>
            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
