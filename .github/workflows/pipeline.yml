name: Run F1 AI News Aggregator Pipeline Daily

on:
  schedule:
    - cron: "0 */6 * * *"  
  workflow_dispatch:        # manual trigger button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger pipeline
        run: curl https://f1-ai-news-aggregator.onrender.com/run-pipeline